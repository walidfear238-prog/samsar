<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAMSAR · Create your account</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="09-register.css" />
<link rel="stylesheet" href="samsar-transitions.css" />
</head>
<body>
<div class="page-trans"><span></span><span></span><span></span></div>
<div class="cursor"></div><div class="cursor-dot"></div>

<div class="ambient"><span class="orb orb-1"></span><span class="orb orb-2"></span></div>

<main class="shell">
  <!-- Photo card (left) -->
  <aside class="photo-card">
    <div class="pc-top">
      <a href="index.html" class="brand">
        <svg class="brand-mark" viewBox="0 0 100 100"><path d="M22 44 L50 18 L78 44 L78 86 Q78 90 74 90 L26 90 Q22 90 22 86 Z M38 38 L62 38 L62 50 L38 50 Z M38 60 L62 60 L62 72 L38 72 Z" fill-rule="evenodd"/></svg>
        <span class="brand-word">SAMSAR</span>
      </a>
    </div>
    <div class="pc-img">
      <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=1400&q=85" alt="Sunlit Moroccan riad courtyard with arches"/>
    </div>
    <div class="pc-foot">
      <div class="pc-quote">
        <p>"In Morocco, the samsar's word has always been older than any contract."</p>
        <span>— Salma El Idrissi, co-founder</span>
      </div>
      <span class="pc-caption">Riad in the medina of Marrakech</span>
    </div>
  </aside>

  <!-- Form (right) -->
  <section class="form-side">
    <div class="form-inner">
      <header class="form-head">
        <h1>Create your account.<br/>Open every <em>door.</em></h1>
        <div class="head-actions">
          <a href="index.html" class="circle-btn" aria-label="Back">←</a>
          <span class="head-text">Already a member? <a href="08-login.html" class="head-link">Sign in</a></span>
        </div>
      </header>

      <!-- User / Agency toggle -->
      <div class="type-toggle" role="radiogroup" aria-label="Account type">
        <label class="tt-opt active" data-type="user">
          <input type="radio" name="acct" value="user" checked/>
          <span class="tt-ico">⌂</span>
          <span class="tt-text"><strong>Personal User</strong><em>Browse & message sellers</em></span>
        </label>
        <label class="tt-opt" data-type="agency">
          <input type="radio" name="acct" value="agency"/>
          <span class="tt-ico">▤</span>
          <span class="tt-text"><strong>Real Estate Agency</strong><em>List properties & build a brand</em></span>
        </label>
      </div>

      <form id="reg-form" class="form">
        <div class="row">
          <label class="floating">
            <input type="text" required placeholder=" "/>
            <span>First name</span>
          </label>
          <label class="floating">
            <input type="text" required placeholder=" "/>
            <span>Last name</span>
          </label>
        </div>

        <div class="agency-fields" id="agency-fields" hidden>
          <div class="row">
            <label class="floating">
              <input type="text" placeholder=" "/>
              <span>Agency name</span>
            </label>
            <label class="floating">
              <select required>
                <option disabled selected hidden></option>
                <option>Marrakech</option><option>Casablanca</option><option>Tangier</option><option>Rabat</option><option>Fès</option><option>Essaouira</option>
              </select>
              <span>City</span>
            </label>
          </div>
        </div>

        <label class="floating">
          <input type="email" required placeholder=" "/>
          <span>Email address</span>
        </label>

        <label class="floating">
          <input type="tel" placeholder=" "/>
          <span>Phone (optional)</span>
        </label>

        <label class="floating">
          <input type="password" id="pw" required placeholder=" "/>
          <span>Password</span>
          <button type="button" class="eye" id="pw-toggle" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </label>
        <div class="meter"><span></span></div>

        <label class="check terms"><input type="checkbox" required/><span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span></label>

        <button class="pill-btn" type="submit">
          <span>Create free account</span>
          <span class="pill-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
        </button>

        <p class="legal">No credit card. No spam. Cancel anytime — your data is never sold.</p>
      </form>
    </div>
  </section>
</main>

<script src="samsar-transitions.js"></script>
<script src="09-register.js"></script>
<script>
(function(){
  if(window.SamsarTransition && !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    var old=document.querySelector('.page-trans');if(old)old.remove();
    setTimeout(function(){SamsarTransition.play('clip-circle-corner','slow')},50);
  }
})();
</script>
</body>
</html>
